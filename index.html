<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Testimonials | Ultra HD</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        /* 🛠️ GLOBAL RESET: Prevents overlap and layout shifting */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent-color: #FFBF23;
            --border-color: #FFBF23;
            --bg-dark: #0d0d0d;
            --card-bg: #000000;
            --text-gray: #a1a1a1;
        }

        body {
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom right, #ffffff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔧 CONTROL PANEL: Grid ensures no field overlap */
        .controls {
            background: #181818;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #2a2a2a;
            width: 100%;
            max-width: 600px;
            margin-bottom: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-size: 14px;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--accent-color); }
        textarea { height: 90px; resize: none; }

        /* 🎨 THEME SECTION */
        .theme-section {
            grid-column: span 2;
            display: flex;
            justify-content: space-around;
            background: #222;
            padding: 20px;
            border-radius: 16px;
            margin: 10px 0;
        }

        .picker-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
            box-shadow: 0 0 0 3px #444;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        .btn-group {
            grid-column: span 2;
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            border: none;
            transition: 0.2s;
        }

        .add-btn { background: var(--accent-color); color: black; }
        .dl-btn { background: transparent; color: var(--accent-color); border: 2px solid var(--accent-color); }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* 📦 TESTIMONIAL CARD */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 80px;
        }

        .testimonial-card {
            background: #000;
            padding: 45px;
            border-radius: 40px;
            border: 4px solid var(--border-color);
            position: relative;
            width: 440px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        .delete-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 60, 60, 0.2);
            color: #ff4d4d;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* 🖼️ THE CRYSTAL CLEAR FIX: NO STRETCH, NO BLUR */
        .img-frame {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Keeps image sharp and centered */
            image-rendering: auto;
            display: block;
        }

        .name { font-weight: 800; font-size: 22px; color: var(--accent-color); margin: 0; }
        .role { font-size: 15px; color: var(--text-gray); margin-top: 4px; }
        .testimonial-text { font-size: 17px; line-height: 1.7; color: #eee; font-weight: 400; }

        @media (max-width: 600px) {
            .control-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>

<body>

    <header>
        <h1>Aura Testimonials</h1>
    </header>

    <div class="controls">
        <div class="control-grid">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="nameInput" placeholder="Arjun Nair">
            </div>
            <div class="form-group">
                <label class="form-label">Title / Role</label>
                <input type="text" id="roleInput" placeholder="Startup Founder">
            </div>
            <div class="form-group full-width">
                <label class="form-label">The Testimonial</label>
                <textarea id="textInput" placeholder="Enter success story..."></textarea>
            </div>
            <div class="form-group full-width">
                <label class="form-label">Profile Image</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="theme-section">
                <div class="picker-group">
                    <label class="form-label" style="margin:0">Accent</label>
                    <input type="color" id="accentPicker" value="#FFBF23" oninput="updateTheme()">
                </div>
                <div class="picker-group">
                    <label class="form-label" style="margin:0">Border</label>
                    <input type="color" id="borderPicker" value="#FFBF23" oninput="updateTheme()">
                </div>
            </div>

            <div class="btn-group">
                <button class="add-btn" onclick="addCard()">Generate Card</button>
                <button class="dl-btn" onclick="downloadAll()">Export All PNG</button>
            </div>
        </div>
    </div>

    <div class="container" id="cardContainer"></div>

    <script>
        function updateTheme() {
            const accent = document.getElementById("accentPicker").value;
            const border = document.getElementById("borderPicker").value;
            document.documentElement.style.setProperty('--accent-color', accent);
            document.documentElement.style.setProperty('--border-color', border);
        }

        function addCard() {
            const nameInput = document.getElementById("nameInput");
            const roleInput = document.getElementById("roleInput");
            const textInput = document.getElementById("textInput");
            const imageInput = document.getElementById("imageInput");

            const name = nameInput.value || "Arjun Nair";
            const role = roleInput.value || "Startup Founder";
            const text = textInput.value || "The quality of these cards is now perfect. No blur, no stretching, just premium design.";
            const file = imageInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => createCard(name, role, text, e.target.result);
                reader.readAsDataURL(file);
            } else {
                createCard(name, role, text, `https://ui-avatars.com/api/?name=${name}&background=222&color=fff`);
            }

            nameInput.value = ""; roleInput.value = ""; textInput.value = ""; imageInput.value = "";
        }

        function createCard(name, role, text, imageSrc) {
            const card = document.createElement("div");
            card.className = "testimonial-card";
            
            card.innerHTML = `
                <div class="delete-btn" onclick="this.parentElement.remove()" data-html2canvas-ignore="true">×</div>
                <div class="profile">
                    <div class="img-frame">
                        <img src="${imageSrc}" alt="profile">
                    </div>
                    <div>
                        <p class="name">${name}</p>
                        <p class="role">${role}</p>
                    </div>
                </div>
                <div class="testimonial-text">"${text}"</div>
            `;
            document.getElementById("cardContainer").appendChild(card);
        }

        function downloadAll() {
            const cards = document.querySelectorAll(".testimonial-card");
            if (cards.length === 0) return alert("Add a card first!");

            cards.forEach((card, index) => {
                html2canvas(card, { 
                    scale: 5,               // MAX High Quality
                    backgroundColor: null, 
                    useCORS: true,
                    allowTaint: true,
                    logging: false,
                    imageTimeout: 0
                }).then(canvas => {
                    const link = document.createElement("a");
                    link.download = `Aura_Testimonial_${index + 1}.png`;
                    link.href = canvas.toDataURL("image/png", 1.0);
                    link.click();
                });
            });
        }
    </script>
</body>
</html>
